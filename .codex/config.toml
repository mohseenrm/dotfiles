# ~/.codex/config.toml — managed via dotfiles (stow)
# Migrated from .config/opencode/opencode.jsonc
# Reference: https://developers.openai.com/codex/config-reference
#
# NOTE: This file is symlinked into ~/.codex/ by `stow .`. Codex's runtime
# state (auth.json, *.sqlite, logs, history.jsonl, cache/) lives alongside it
# in ~/.codex/ and is NOT git-managed.

# --- Model -------------------------------------------------------------------
# opencode used anthropic/claude-opus-4-8. Codex talks to OpenAI models by
# default; pick a current Codex model. Override per-session with `codex -m`.
model = "gpt-5.5-codex"

# --- Sandbox & approvals -----------------------------------------------------
# You chose full-access / no approval prompts (YOLO equivalent of opencode
# tools=all + bash allowed). danger-full-access disables the sandbox.
default_permissions = ":danger-full-access"
approval_policy = "never"

# --- Web search --------------------------------------------------------------
# opencode had webfetch=true. Codex exposes web search as a first-class tool.
web_search = "live"

# --- Updates -----------------------------------------------------------------
# opencode autoupdate=true -> Codex update check on startup.
check_for_update_on_startup = true

# --- Subagents (global caps) -------------------------------------------------
# Individual agents are defined as TOML files in ~/.codex/agents/*.toml.
[agents]
max_threads = 6
max_depth = 1

# --- TUI ---------------------------------------------------------------------
# opencode tui.json -> Codex [tui]. brutus (custom opencode theme) has no
# Codex equivalent; using a built-in dark theme. Run `/themes` in Codex to
# browse options and change `theme` below.
[tui]
theme = "dark"
vim_mode_default = false

# Keymap ported from .config/opencode/tui.json + ~/.claude/keybindings.json.
#
# IMPORTANT — two gotchas that make keymaps silently "not take effect":
#   1. Keys use HYPHENS, not plus: `ctrl-o`, `shift-enter`, `alt-left`. Codex
#      rejects `ctrl+o`.
#   2. An UNKNOWN action name or a bad key value fails the WHOLE config load,
#      and Codex falls back to built-in defaults (so it looks like nothing was
#      applied — and model/MCP/sandbox settings silently revert too). After any
#      edit here, run:  codex doctor   and confirm `✓ config  loaded`.
#
# Codex has no <leader> concept, no theme-toggle hotkey, no todo/brief panels,
# no model picker, and no session-list/new hotkeys in the keymap. Those opencode
# (<leader>l/n/m/t...) and Claude Code (ctrl+t todos, ctrl+shift+b brief,
# meta+p model picker, theme:toggle) bindings have NO Codex equivalent and are
# intentionally omitted rather than mapped to invented actions. Valid action
# names per context (from the 0.141.0 binary):
#   global   : open_transcript open_external_editor copy clear_terminal
#              toggle_vim_mode toggle_fast_mode toggle_raw_output
#   chat     : interrupt_turn decrease_reasoning_effort
#              increase_reasoning_effort edit_queued_message
#   composer : submit queue toggle_shortcuts history_search_previous
#              history_search_next
#   editor   : insert_newline move_word_left move_word_right delete_backward
#              delete_forward delete_backward_word delete_forward_word
#              kill_line_start kill_whole_line kill_line_end yank
#   pager    : scroll_up scroll_down half_page_up half_page_down page_up
#              page_down jump_top jump_bottom close close_transcript
#   list     : move_up move_down move_left move_right page_up page_down
#              jump_top jump_bottom accept cancel
#   approval : open_fullscreen open_thread approve approve_for_session
#              approve_for_prefix deny decline cancel
# Values: "key" or ["key1","key2"]. Unbind with [].

# CC ctrl+o (toggleTranscript), ctrl+e (externalEditor), meta+o (fastMode);
# opencode <leader>e (editor_open), <leader>y (messages_copy).
[tui.keymap.global]
open_transcript = "ctrl-o"
open_external_editor = "ctrl-e"
toggle_fast_mode = "alt-o"
copy = "ctrl-y"

# CC escape (chat:cancel) -> interrupt; CC modelPicker left/right (effort).
[tui.keymap.chat]
interrupt_turn = "escape"
decrease_reasoning_effort = "alt-left"
increase_reasoning_effort = "alt-right"

# CC/opencode enter (submit); opencode up/down history.
[tui.keymap.composer]
submit = "enter"
history_search_previous = "up"
history_search_next = "down"

# opencode input_newline: shift+return,ctrl+return,alt+return,ctrl+j.
[tui.keymap.editor]
insert_newline = ["shift-enter", "ctrl-j"]

# Vim-like scrolling (mirrors CC Transcript/Scroll + opencode half-page).
# User values REPLACE defaults, so home/end are restated alongside g/G.
[tui.keymap.pager]
half_page_up = "ctrl-u"
half_page_down = "ctrl-d"
jump_top = ["home", "g"]
jump_bottom = ["end", "shift-g"]

# CC Select context: j/k + arrows for list navigation.
[tui.keymap.list]
move_down = ["down", "j"]
move_up = ["up", "k"]

# CC Confirmation: y / n.
[tui.keymap.approval]
approve = "y"
deny = "n"

# --- MCP servers (personal) --------------------------------------------------
# opencode "mcp" -> Codex [mcp_servers.<id>].
# Remote HTTP servers use `url`; local stdio servers use `command` + `args`.

[mcp_servers.excalidraw]
url = "https://mcp.excalidraw.com"

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
# Codex http_headers are STATIC (no ${VAR} expansion). For an env-sourced
# bearer token, use bearer_token_env_var. opencode used {env:GITHUB_MCP_KEY};
# export GITHUB_MCP_KEY (e.g. via ~/.envrc) for this to authenticate.
bearer_token_env_var = "GITHUB_MCP_KEY"

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]

# recraft was disabled in opencode; omit (re-add with a [mcp_servers.recraft]
# block + url = "https://mcp.recraft.ai/mcp" when needed).

# --- Project trust (preserved from prior Codex install) ----------------------

[tui.model_availability_nux]
"gpt-5.5" = 1
