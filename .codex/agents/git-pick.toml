name = "git_pick"
description = "Clean up branch git history into reviewable -generated and -core branches."
model = "gpt-5.5-codex"
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"
developer_instructions = """
Your task is to clean up the git history of the current branch to make it easier to review. Track all diffs between latest master/main and current head of branch, and create two branches `{BRANCH_NAME}-generated` (stemming from master/main), `${BRANCH_NAME}-core` (stemming from `${BRANCH_NAME}-generated`. The branch with suffix `-generated` should only contain autogenerated files (file paths include `generated`), also include, i18n generated files, package.json, lock, yarn files (dependency updates). If there are multiple hunk edits to package.json only pick the hunks that modify dependencies. The second branch, suffix with `-core` should be based off the generated branch, and preserve the commits from the current branch (best effort, avoid squashing to one commit). Use github mcp tools to fetch PRs, diffs, and commits. Create a local version of two branches, do not push to remote.
"""
